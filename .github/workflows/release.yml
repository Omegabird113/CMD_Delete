name: Release

on:
  workflow_dispatch:
    inputs:
      release_title:
        description: "Release title (e.g. CMD + Delete 1.3.0 Beta 2)"
        required: true
        type: string
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - beta
          - alpha

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read gradle.properties
        id: props
        run: |
          version=$(grep -E '^mod_version\s*=' gradle.properties | sed 's/.*=\s*//')
          loader_version=$(grep -E '^loader_version\s*=' gradle.properties | sed 's/.*=\s*//')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "loader_version=$loader_version" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: "microsoft"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Locate built JAR
        id: jar
        run: |
          JARS=$(find build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar")

          COUNT=$(echo "$JARS" | wc -l)

          if [ "$COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 JAR, found $COUNT"
            echo "$JARS"
            exit 1
          fi

          JAR="$JARS"
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Check that changelog exists
        run: |
          test -f changelog.md || {
            echo "Missing changelog.md"
            exit 1
          }

      - name: Check if release already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.props.outputs.version }}" >/dev/null 2>&1; then
            echo "ERROR: Release ${{ steps.props.outputs.version }} already exists"
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" != "release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ steps.props.outputs.version }}" \
            "${{ steps.jar.outputs.path }}" \
            --target "${{ github.sha }}" \
            --title "${{ inputs.release_title }}" \
            --notes-file changelog.md \
            $PRERELEASE_FLAG

      - name: Publish to Modrinth, CurseForge, & GitHub
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: xrOWVab9
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: 1455987
          curseforge-token: ${{ secrets.CF_API_TOKEN }}
          files: ${{ steps.jar.outputs.path }}
          name: ${{ inputs.release_title }}
          version: ${{ steps.props.outputs.version }}
          version-type: ${{ inputs.release_type }}
          changelog-file: changelog.md
          java: 21
          game-versions: |
            >=1.20.5 <1.21.6
          loaders: fabric
