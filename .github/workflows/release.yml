name: Release

on:
  workflow_dispatch:
    inputs:
      release_title:
        description: "Release title (e.g. CMD + Delete 1.3.0 Beta 2)"
        required: true
        type: string
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - beta
          - alpha

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read gradle.properties
        id: props
        run: |
          set -euo pipefail
          version=$(grep -E '^mod_version\s*=' gradle.properties | sed 's/.*=\s*//')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: "microsoft"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build --stacktrace

      - name: Locate built JAR
        id: jar
        run: |
          set -euo pipefail
          mapfile -t JARS < <(
            find build/libs -maxdepth 1 -type f -name "*.jar" \
              ! -name "*-sources.jar" \
              ! -name "*-javadoc.jar" \
              ! -name "*-dev.jar"
          )

          if [ "${#JARS[@]}" -eq 0 ]; then
            echo "ERROR: No release JAR found."
            exit 1
          fi

          if [ "${#JARS[@]}" -gt 1 ]; then
            echo "Multiple candidate JARs found:"
            printf ' - %s\n' "${JARS[@]}"
            echo "Using the first one."
          fi

          echo "path=${JARS[0]}" >> "$GITHUB_OUTPUT"

      - name: Check that changelog exists
        run: |
          set -euo pipefail
          test -f changelog.md || {
            echo "Missing changelog.md"
            exit 1
          }
    
      - name: Check if release already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "${{ steps.props.outputs.version }}" >/dev/null 2>&1; then
            echo "ERROR: Release ${{ steps.props.outputs.version }} already exists"
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" != "release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ steps.props.outputs.version }}" \
            "${{ steps.jar.outputs.path }}" \
            --target "${{ github.sha }}" \
            --title "${{ inputs.release_title }}" \
            --notes-file changelog.md \
            $PRERELEASE_FLAG

      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: xrOWVab9
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: 1455987
          curseforge-token: ${{ secrets.CF_API_TOKEN }}
          files: ${{ steps.jar.outputs.path }}
          name: ${{ inputs.release_title }}
          version: ${{ steps.props.outputs.version }}
          version-type: ${{ inputs.release_type }}
          changelog-file: changelog.md
          java: 25
          game-versions: |
            >=26.1 <=26.3-snapshot.3
            >=26.1-pre.1 <=26.1
            >=26.1-rc.1 <=26.1
          loaders: |
            fabric
            quilt
