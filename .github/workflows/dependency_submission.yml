name: Build

on:
  push:
    branches: ['master']

jobs:
  dependency_submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v5
