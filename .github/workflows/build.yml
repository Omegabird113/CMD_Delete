name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v7
    
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build
      run: ./gradlew build --no-daemon

    - name: Test client load
      run: xvfb-run ./gradlew runCiClient --no-daemon

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6
      if: success() || failure()
      with:
        include_passed: true
        detailed_summary: true
        report_paths: '**/build/test-results/test/TEST-*.xml'

    - name: Upload jar
      uses: actions/upload-artifact@v7
      with:
        name: cmd-delete-build
        path: build/libs/*.jar